<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Juniors</title>
    <!-- Importing a tall, condensed font to match the poster style -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #421e23 0%, #2b1317 100%);
            color: #ffb199; /* Soft peach/pink text color */
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 2px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Poster Container with Slower Entrance Animation */
        .poster-container {
            width: 100%;
            max-width: 450px;
            background: #401d22;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 
                        inset 0 0 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            border: 1px solid rgba(255, 177, 153, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            position: relative;
            
            /* Slowed down page reveal (Changed from 1.2s to 2.5s) */
            animation: pageReveal 3s cubic-bezier(0.25, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(40px);
        }

        /* Text Styling */
        .title-main {
            font-size: 4.5rem;
            line-height: 0.9;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .title-sub {
            font-size: 5rem;
            line-height: 0.9;
            text-transform: uppercase;
        }

        /* The Custom Divider Line Under Welcome Juniors */
        .divider-line {
            width: 80%;
            height: 4px;
            background-color: #ffb199;
            margin: 15px auto 30px auto;
            border-radius: 2px;
            box-shadow: 0 2px 10px rgba(255, 177, 153, 0.3);
            
            /* Slowed down line growth with an intentional delay */
            animation: lineExpand 2s cubic-bezier(0.25, 1, 0.3, 1) 1.2s both;
        }

        .greeting-1 {
            font-size: 5.5rem;
            line-height: 0.9;
            text-align: left;
            padding-left: 10px;
        }

        .greeting-2 {
            font-size: 6.5rem;
            line-height: 0.85;
            text-align: left;
            padding-left: 10px;
            margin-bottom: 30px;
            display: inline-block;
        }

        /* Image container styling */
        .image-placement-area {
            width: 100%;
            margin-top: auto;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            
            /* Slowed down image fade-in with a delayed start */
            animation: imageFade 2s cubic-bezier(0.25, 1, 0.3, 1) 1.8s both;
        }

        .image-placement-area img {
            max-width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
            mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
        }

        /* ======================================================= */
        /* ANIMATION TIMELINES (Slower, smoother transitions)       */
        /* ======================================================= */
        
        /* Smooth, slow fade up for the whole layout card */
        @keyframes pageReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Decorative line expands smoothly from the center */
        @keyframes lineExpand {
            from { width: 0%; opacity: 0; }
            to { width: 85%; opacity: 1; }
        }

        /* Luxurious slow fade-in for your photo */
        @keyframes imageFade {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Responsive scaling for mobile layouts */
        @media (max-width: 400px) {
            .title-main { font-size: 3.5rem; }
            .title-sub { font-size: 4rem; }
            .greeting-1 { font-size: 4.5rem; }
            .greeting-2 { font-size: 5rem; }
        }
    </style>
</head>
<body>

    <div class="poster-container">
        
        <!-- Header Text Section -->
        <h1 class="title-main">Welcome</h1>
        <h1 class="title-sub">Juniors</h1>
        
        <!-- Custom Line Below Text -->
        <div class="divider-line"></div>
        
        <!-- Catchphrase Section -->
        <div class="greeting-1">Hai</div>
        <div class="greeting-2">Chellow...!!</div>

        <!-- ======================================================= -->
        <!-- IMAGE PLACEHOLDER CODE SECTION                          -->
        <!-- ======================================================= -->
        <div class="image-placement-area">
            
            <!-- Paste your GitHub image name or URL inside the src="" below -->
            <img src="phto.png" alt="yeahh.dosthkyy">
            
        </div>
        <!-- ======================================================= -->

    </div>

</body>
</html>
