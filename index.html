<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Plus One Students</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#4facfe);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
    overflow:hidden;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    width:90%;
    max-width:900px;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.2);
    border-radius:25px;
    padding:50px;
    text-align:center;
    color:white;
    box-shadow:0 20px 40px rgba(0,0,0,.35);
    animation:fadeIn 1.5s;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    font-size:55px;
    margin-bottom:15px;
}

.school{
    font-size:30px;
    color:#ffe66d;
    margin-bottom:20px;
}

.message{
    font-size:20px;
    line-height:1.8;
    margin:30px 0;
}

.quote{
    font-style:italic;
    color:#dff9fb;
    margin-bottom:30px;
}

button{
    padding:16px 40px;
    font-size:18px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    background:#ffcc00;
    color:#222;
    font-weight:bold;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
    background:white;
}

.footer{
    margin-top:35px;
    color:#ddd;
}

.stars{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:-1;
}

.star{
    position:absolute;
    width:4px;
    height:4px;
    background:white;
    border-radius:50%;
    animation:twinkle 2s infinite;
}

@keyframes twinkle{
    50%{
        opacity:.2;
        transform:scale(2);
    }
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="card">

<h1>🎉 Welcome 🎉</h1>

<div class="school">
YOUR SCHOOL NAME
</div>

<h2>Plus One Students 2026–27</h2>

<div class="message">
Welcome to a new chapter of your academic journey.<br>
May this year bring new friendships, knowledge,
confidence, and unforgettable memories.
</div>

<div class="quote">
"Dream Big • Learn More • Achieve Greatness"
</div>

<button onclick="welcome()">
Start Your Journey
</button>

<div class="footer">
Made with ❤️ to welcome our new students
</div>

</div>

<script>
function welcome(){
    alert("🌟 Welcome to Plus One! Wishing you success, happiness, and an amazing academic year!");
}

const stars=document.getElementById("stars");

for(let i=0;i<120;i++){
    const s=document.createElement("div");
    s.className="star";
    s.style.left=Math.random()*100+"%";
    s.style.top=Math.random()*100+"%";
    s.style.animationDelay=Math.random()*2+"s";
    stars.appendChild(s);
}
</script>

</body>
</html>
